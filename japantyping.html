<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日文打字挑戰賽</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #2ecc71;
            --error: #e74c3c;
            --bg: #f5f6fa;
        }

        body {
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg);
        }

        #game-container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 600px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-weight: bold;
            color: #666;
        }

        #word-display {
            font-size: 3rem;
            margin: 20px 0;
            min-height: 4.5rem;
            color: #2c3e50;
        }

        #romaji-hint {
            font-size: 1.2rem;
            color: #95a5a6;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        input {
            width: 80%;
            padding: 12px 20px;
            font-size: 1.2rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary);
        }

        .correct { color: var(--success); }
        .current { text-decoration: underline; color: var(--primary); }

        .shake {
            animation: shake 0.2s ease-in-out 0s 2;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(5px); }
            50% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        button {
            margin-top: 20px;
            padding: 10px 25px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats">
        <div>得分: <span id="score">0</span></div>
        <div>剩餘時間: <span id="timer">60</span>s</div>
    </div>

    <div id="word-display">載入中...</div>
    <div id="romaji-hint"></div>
    
    <input type="text" id="input-field" placeholder="在此輸入羅馬拼音..." autocomplete="off">
    
    <div id="controls">
        <button onclick="startGame()">開始遊戲 / 重置</button>
    </div>
</div>

<script>
    // 遊戲題目資料庫 (日文, 對應羅馬拼音)
    const wordList = [
        {ja: "こんにちは", ro: "konnichiwa"},
        {ja: "さくら", ro: "sakura"},
        {ja: "ねこ", ro: "neko"},
        {ja: "すし", ro: "sushi"},
        {ja: "ありがとう", ro: "arigatou"},
        {ja: "パソコン", ro: "pasokon"},
        {ja: "カメラ", ro: "kamera"},
        {ja: "せんせい", ro: "sensei"},
        {ja: "たべもの", ro: "tabemono"},
        {ja: "にほんご", ro: "nihongo"},
        {ja: "ラーメン", ro: "ra-men"},
        {ja: "みず", ro: "mizu"}
    ];

    let currentWord = {};
    let score = 0;
    let timeLeft = 60;
    let timerId = null;
    let isPlaying = false;

    const wordDisplay = document.getElementById('word-display');
    const romajiHint = document.getElementById('romaji-hint');
    const inputField = document.getElementById('input-field');
    const scoreDisplay = document.getElementById('score');
    const timerDisplay = document.getElementById('timer');

    function startGame() {
        if (timerId) clearInterval(timerId);
        score = 0;
        timeLeft = 60;
        isPlaying = true;
        scoreDisplay.innerText = score;
        timerDisplay.innerText = timeLeft;
        inputField.value = "";
        inputField.disabled = false;
        inputField.focus();
        
        nextWord();
        startTimer();
    }

    function startTimer() {
        timerId = setInterval(() => {
            timeLeft--;
            timerDisplay.innerText = timeLeft;
            if (timeLeft <= 0) {
                endGame();
            }
        }, 1000);
    }

    function nextWord() {
        const randomIndex = Math.floor(Math.random() * wordList.length);
        currentWord = wordList[randomIndex];
        wordDisplay.innerText = currentWord.ja;
        romajiHint.innerText = currentWord.ro;
    }

    function endGame() {
        clearInterval(timerId);
        isPlaying = false;
        inputField.disabled = true;
        alert(`遊戲結束！你的得分是：${score}`);
    }

    inputField.addEventListener('input', (e) => {
        if (!isPlaying) return;

        const val = e.target.value.toLowerCase();
        const target = currentWord.ro;

        if (val === target) {
            // 完全答對
            score += 10;
            scoreDisplay.innerText = score;
            e.target.value = "";
            nextWord();
        } else if (!target.startsWith(val)) {
            // 打錯了
            inputField.classList.add('shake');
            setTimeout(() => inputField.classList.remove('shake'), 200);
        }
    });

    // 防止貼上
    inputField.onpaste = e => e.preventDefault();
</script>

</body>
</html>
